name: Push to Replicate
on:
  push:
    branches: [master, main]
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog
      - name: Push to Replicate
        env:
          COG_CLI_TOKEN: ${{ secrets.COG_CLI_TOKEN }}
        run: |
          echo "$COG_CLI_TOKEN" | cog login --token-stdin
          cog push r8.im/shiyi-12138/photo-restore
